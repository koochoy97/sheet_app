server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # index.html nunca se cachea para que siempre cargue los assets correctos
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # Single-page app routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache busting friendly assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
